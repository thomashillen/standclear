name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Lint is informational while pre-existing react-hooks/* errors
      # in lib/useTrains.ts and lib/useSheetDrag.ts are still open. Flip
      # `continue-on-error` to false once those are fixed.
      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Test
        run: npm test
